<!DOCTYPE html>
<html>
<head>
    <title>Touch Gesture Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #test-area { 
            width: 300px; 
            height: 200px; 
            border: 2px solid #ccc; 
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        #feedback { 
            background: #e7f3ff; 
            border: 1px solid #b3d9ff;
            padding: 10px;
            margin: 10px 0;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <h1>Touch Gesture Test for Gridmapper</h1>
    <p>This tests the touch gesture functionality we implemented:</p>
    
    <div id="test-area">
        Touch here with 1, 2, or 3 fingers
    </div>
    
    <div id="feedback">
        <strong>Feedback:</strong><br>
        <div id="log"></div>
    </div>
    
    <script>
        // Simple version of our touch gesture detection
        var TouchGestures = {
            multiTapTimeout: null,
            multiTapFingers: 0,
            multiTapStartTime: 0
        };
        
        function log(message) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + message + '<br>';
        }
        
        function showFeedback(message) {
            log('GESTURE: ' + message);
        }
        
        function handleMultiTouchGesture(evt) {
            evt.preventDefault();
            
            var touches = evt.touches;
            var numTouches = touches.length;
            
            if (evt.type === 'touchstart') {
                TouchGestures.multiTapFingers = numTouches;
                TouchGestures.multiTapStartTime = Date.now();
                
                log('Touch started with ' + numTouches + ' finger(s)');
                
                TouchGestures.multiTapTimeout = setTimeout(function() {
                    TouchGestures.multiTapTimeout = null;
                    log('Gesture timeout - no quick tap detected');
                }, 300);
                
                return;
            }
            
            if (evt.type === 'touchend' && TouchGestures.multiTapTimeout) {
                var tapDuration = Date.now() - TouchGestures.multiTapStartTime;
                
                log('Touch ended after ' + tapDuration + 'ms with ' + TouchGestures.multiTapFingers + ' fingers');
                
                if (tapDuration < 300) {
                    if (TouchGestures.multiTapFingers === 1) {
                        showFeedback('Single tap - place tile');
                    } else if (TouchGestures.multiTapFingers === 2) {
                        showFeedback('Two-finger tap - UNDO');
                    } else if (TouchGestures.multiTapFingers === 3) {
                        showFeedback('Three-finger tap - REDO');
                    }
                }
                
                clearTimeout(TouchGestures.multiTapTimeout);
                TouchGestures.multiTapTimeout = null;
                return;
            }
        }
        
        // Set up event listeners
        const testArea = document.getElementById('test-area');
        
        testArea.addEventListener('touchstart', handleMultiTouchGesture, { passive: false });
        testArea.addEventListener('touchmove', handleMultiTouchGesture, { passive: false });
        testArea.addEventListener('touchend', handleMultiTouchGesture, { passive: false });
        
        // Also test single touch
        testArea.addEventListener('touchstart', function(evt) {
            if (evt.touches.length === 1) {
                log('Single touch detected at (' + Math.round(evt.touches[0].pageX) + ', ' + Math.round(evt.touches[0].pageY) + ')');
                if (evt.touches[0].touchType === 'stylus') {
                    log('Apple Pencil detected!');
                }
                if (evt.touches[0].force) {
                    log('Pressure: ' + (evt.touches[0].force * 100).toFixed(1) + '%');
                }
            }
        }, { passive: false });
        
        log('Touch test initialized - try touching the gray area with different numbers of fingers');
    </script>
</body>
</html>
